# User-managed experimental feature opt-ins.
#
# Keys in this file must also exist in config/features.yml so the feature is
# registered with Flipper. Only features listed here appear on the profile
# Experimental Features page.
#
# `allowlist` controls which signed-in users are eligible to see and toggle a
# feature for themselves. Supported values today:
# - `all`: every authenticated user is eligible.
# - an array of email addresses: only those users are eligible.
#
# Email allowlists are matched case-insensitively after trimming whitespace.
# Keep test expectations explicit: controller and system tests that need an
# eligible user should override USER_OPT_IN_FEATURE_CONFIG instead of assuming
# fixture users are allowlisted by default.
#
# Example entry:
# another_feature_key:
#   allowlist: all
#   name:
#     en: "Feature name shown in English"
#     fr: "Nom de la fonctionnalite en francais"
#   description:
#     en: "Short explanation shown in English."
#     fr: "Courte explication affichee en francais."
user_opt_in_features:
  data_grid_samples_table:
    # Use `all` to expose the feature to every signed-in user, or provide an
    # email allowlist such as ["person@example.com", "other@example.com"].
    allowlist: [user1@email.com]
    name:
      en: "Data Grid Samples Table"
      fr: "Tableau de données des échantillons"
    description:
      en: "Enable the new data grid for the samples table."
      fr: "Activer la nouvelle grille de données pour le tableau d'échantillons."
