pre-commit:
  parallel: true
  jobs:
    - name: rubocop_ci
      run: bin/rubocop -f github

    - name: prettier
      glob:
        - "*.{js,jsx,ts,tsx,css,json,md}"
        - "**/*.{js,jsx,ts,tsx,css,json,md}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

    - name: eslint
      glob:
        - "*.js"
        - "**/*.js"
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true

    - name: herb_ci_lint
      run: scripts/hooks/run_ci_herb_check.sh herb:lint

    - name: herb_ci_format_check
      run: scripts/hooks/run_ci_herb_check.sh herb:format:check

    - name: i18n_normalize
      glob:
        - "config/locales/*.yml"
        - "config/locales/**/*.yml"
        - "config/locales/*.yaml"
        - "config/locales/**/*.yaml"
      run: bundle exec i18n-tasks normalize
      stage_fixed: true
